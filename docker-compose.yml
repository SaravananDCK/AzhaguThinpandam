services:
  app:
    build:
      context: .
      # NEXT_PUBLIC_* are inlined into the browser bundle at build time.
      # Compose reads these from the .env file next to this compose file.
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
        NEXT_PUBLIC_DEVEXTREME_KEY: ${NEXT_PUBLIC_DEVEXTREME_KEY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # These override .env inside the container — paths refer to the volumes below.
      # connection_limit=1 serializes DB access (SQLite is single-writer) so
      # concurrent writes queue instead of deadlocking.
      DATABASE_URL: "file:/app/data/store.db?connection_limit=1"
      UPLOADS_DIR: "/app/uploads"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set DOMAIN in .env (e.g. DOMAIN=azhaguthinpandam.com)
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:

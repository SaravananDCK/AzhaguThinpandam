services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # These override .env inside the container — paths refer to the volumes below
      DATABASE_URL: "file:/app/data/store.db"
      UPLOADS_DIR: "/app/uploads"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set DOMAIN in .env (e.g. DOMAIN=azhaguthinpandam.com)
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
